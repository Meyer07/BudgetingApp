<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
    <div class="card p-4">
        <h4 class="mb-3 text-center">💰 Create Account</h4>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-2">Sign Up</button>
        </form>
        <p class="text-center mt-3">Already have an account? <a href="/accounts/login/">Login</a></p>
    </div>
</div>
</body>
</html>
